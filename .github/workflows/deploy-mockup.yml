name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-mockup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-mockup-mintlify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-mockup-mintlify/package-lock.json
      - run: npm ci --ignore-scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - run: npx mintlify export
      - run: |
          mkdir -p _site
          unzip export.zip -d _site
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-mockup-mintlify/_site
